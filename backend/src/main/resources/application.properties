server.port=${PORT:8081}

# --- Supabase Database Configuration ---
# Disable server-side prepared statements for pooled Supabase connections.
# Added socketTimeout and connectTimeout for resilience against cold-start hangs.
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:6543}/postgres?sslmode=require&preferQueryMode=simple&prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSizeMiB=0&socketTimeout=30&connectTimeout=30
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- HikariCP Connection Pool (tuned for Supabase free-tier) ----
# Keep pool fully warm: minimum-idle = maximum-pool-size avoids cold-start delays.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=5
# Allow up to 30s to acquire a connection (Supabase cold-starts can take 10-15s).
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
# Keep idle connections alive for 10 minutes (prevents premature eviction).
spring.datasource.hikari.idle-timeout=600000
# Connections live up to 30 minutes before being recycled.
spring.datasource.hikari.max-lifetime=1800000
# Send a TCP keepalive every 60s to prevent Supabase/firewalls from dropping idle connections.
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.leak-detection-threshold=30000
# Use a lightweight query to validate connections before use (fast fail on dead connections).
spring.datasource.hikari.connection-test-query=SELECT 1
# Don't block app startup waiting for the pool — initialize lazily.
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.auto-commit=true

# ---- JPA / Hibernate ----
# Use 'none' to skip DDL introspection (saves 2-5s on startup with Supabase).
# Temporarily switch to 'update' when you add/change entity fields, then switch back.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Disable open-in-view to release DB connections faster (don't hold for entire request lifecycle).
spring.jpa.open-in-view=false
# Batch inserts/updates for better performance.
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

logging.level.com.kaveri=INFO

# Groq AI Service
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.model=${GROQ_API_MODEL:llama-3.1-8b-instant}

# JWT Security Configuration
jwt.secret=${JWT_SECRET:KaveriPOS-SuperSecretKey-2026-256bit-HmacSHA256-Signing}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
